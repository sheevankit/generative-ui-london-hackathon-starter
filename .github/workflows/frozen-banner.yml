name: Frozen banner

on:
  pull_request:
    branches: [main]
    # We only need to fire when files that might touch the FROZEN surface change.
    # The actual diff check below is the source of truth — these paths are an
    # optimization to avoid spinning up runners for, e.g., docs-only PRs.
    paths:
      - FROZEN.md
      - package.json
      - pnpm-lock.yaml
      - agent/pyproject.toml
      - agent/uv.lock
      - vendor/**

# This workflow is intentionally non-blocking. It warns; it does not fail the PR.
# Bumping pinned versions is sometimes correct — but it should be a deliberate
# act with an explicit [FROZEN] marker in the PR title acknowledging it.
permissions:
  contents: read
  pull-requests: write

jobs:
  frozen-banner:
    name: Warn on FROZEN.md drift
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the merge base for a real diff.
          fetch-depth: 0

      - name: Diff FROZEN.md against base
        id: diff
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Comparing $BASE_SHA..$HEAD_SHA"

          # Did FROZEN.md change?
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- FROZEN.md | grep -q '^FROZEN.md$'; then
            echo "frozen_changed=true" >> "$GITHUB_OUTPUT"
            echo "FROZEN.md changed in this PR"
          else
            echo "frozen_changed=false" >> "$GITHUB_OUTPUT"
            echo "FROZEN.md not touched"
          fi

          # Does the PR title carry an explicit acknowledgement?
          PR_TITLE="${{ github.event.pull_request.title }}"
          if echo "$PR_TITLE" | grep -iqE '\[FROZEN\]|frozen-bump|frozen update'; then
            echo "title_marker=true" >> "$GITHUB_OUTPUT"
            echo "PR title includes a [FROZEN] marker"
          else
            echo "title_marker=false" >> "$GITHUB_OUTPUT"
            echo "PR title does NOT include a [FROZEN] marker"
          fi

      - name: Warn if FROZEN.md changed without marker
        if: steps.diff.outputs.frozen_changed == 'true' && steps.diff.outputs.title_marker == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "**FROZEN.md drift detected**",
              "",
              "This PR modifies `FROZEN.md` but the PR title doesn't include a `[FROZEN]` marker.",
              "",
              "`FROZEN.md` is the canonical source of truth for pinned versions, the verified Gemini model ID, and the vendoring story. Changing it should be a deliberate act — please confirm one of the following:",
              "",
              "- This is an intentional pin update (Gemini model ID, copilotkit version, etc.). Add `[FROZEN]` to the PR title to acknowledge it.",
              "- This is unintentional drift (e.g. an AI assistant edited it as a side-effect). Please revert.",
              "",
              "This is a warning, not a blocker — proceed if the change is intentional.",
            ].join("\n");

            // Avoid spamming: only post if we haven't already.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const already = comments.find(
              c => c.user && c.user.type === "Bot" && c.body && c.body.includes("FROZEN.md drift detected")
            );
            if (already) {
              core.info("Drift comment already present, skipping.");
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

            core.warning("FROZEN.md changed without an explicit [FROZEN] marker in the PR title.");

      - name: All clear
        if: steps.diff.outputs.frozen_changed == 'false' || steps.diff.outputs.title_marker == 'true'
        run: |
          echo "FROZEN.md drift check: OK"
